name: Biweekly Check

on:
  schedule:
    - cron: 0 9 1,15 * *
  workflow_dispatch:

jobs:
  scheduled-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduled tests
        run: pytest -v
